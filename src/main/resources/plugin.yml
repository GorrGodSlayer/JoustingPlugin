name: JoustingPlugin
version: 1.0.0
main: com.jousting.JoustingPlugin
api-version: 1.21
description: Horse combat system with lance tiers, durability, momentum, shields, and jousting/PvP modes
authors:
  - k4nefr-cmd
commands:
  jousting:
    description: Jousting plugin commands
    usage: /jousting <reload|give iron|gold|diamond>
    permission: jousting.admin
permissions:
  jousting.admin:
    description: Permission to use jousting admin commands
    default: op
  jousting.use:
    description: Permission to wield lances in combat
    default: true
