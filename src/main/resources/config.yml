# Jousting Plugin Configuration

# Lance tiers - each spear material and its flat damage bonus on top of the horse-speed cap
lance-tiers:
  IRON_SPEAR:
    damage-bonus: 0.0
  GOLDEN_SPEAR:
    damage-bonus: 1.0
  DIAMOND_SPEAR:
    damage-bonus: 2.0

# Number of successful hits before a lance breaks
lance-max-uses: 10

# Speed tier detection (horse movement speed attribute threshold)
high-tier-speed-threshold: 1.5

# Base damage caps by horse speed tier (hearts)
low-tier-max-damage: 3.0
high-tier-max-damage: 6.0

# Minimum horse velocity (blocks per tick) required to build momentum
# Below this threshold momentum resets to zero
minimum-run-speed: 0.15

# Minimum distance (blocks) the horse must travel before any damage is dealt
minimum-momentum-distance: 5.0

# Knockoff probabilities (percent) when hitting a mounted player
knockoff-chance-zero-momentum: 5
knockoff-chance-full-momentum: 70

# Sounds (use Minecraft sound keys)
sounds:
  hit: "entity.player.attack.strong"
  knockoff: "entity.item.break"
